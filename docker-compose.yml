version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mfactory-ai-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/database.db
      # Set your actual API keys in production
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-dummy}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-dummy}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: PostgreSQL for production (comment out if using SQLite)
